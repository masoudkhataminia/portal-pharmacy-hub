kind = "web"
previewPath = "/pharmacy-hub/"
title = "Pharmacy Workflow Hub"
version = "1.0.0"
id = "artifacts/pharmacy-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pharmacy-hub/", "/" ]
localPort = 21501

[services.development]
run = "pnpm --filter @workspace/pharmacy-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pharmacy-hub", "run", "build" ]
publicDir = "artifacts/pharmacy-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[[services.production.redirects]]
from = "/"
to = "/pharmacy-hub/"
status = 302

[services.env]
PORT = "21501"
BASE_PATH = "/pharmacy-hub/"
