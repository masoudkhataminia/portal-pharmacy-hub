name: Publish MyPharmacyHub UI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-ui
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --lockfile=false

      - name: Build UI
        run: pnpm --filter @workspace/pharmacy-hub run build
        env:
          BASE_PATH: /portal-pharmacy-hub/

      - name: Prepare static output
        run: |
          cp artifacts/pharmacy-hub/dist/public/index.html artifacts/pharmacy-hub/dist/public/404.html
          touch artifacts/pharmacy-hub/dist/public/.nojekyll

      - name: Publish static output to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: artifacts/pharmacy-hub/dist/public
          clean: true
