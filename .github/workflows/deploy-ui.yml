name: Deploy MyPharmacyHub UI to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ui-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --lockfile=false

      - name: Build UI
        run: pnpm --filter @workspace/pharmacy-hub run build
        env:
          BASE_PATH: /

      - name: Check deployment secrets
        run: |
          test -n "$SSH_HOST" || (echo "Missing GitHub secret: SSH_HOST" && exit 1)
          test -n "$SSH_USER" || (echo "Missing GitHub secret: SSH_USER" && exit 1)
          test -n "$SSH_PRIVATE_KEY" || (echo "Missing GitHub secret: SSH_PRIVATE_KEY" && exit 1)
          test -n "$SERVER_PATH" || (echo "Missing GitHub secret: SERVER_PATH" && exit 1)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy built UI to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT:-22}" \
            artifacts/pharmacy-hub/dist/public/ \
            "$SSH_USER@$SSH_HOST:$SERVER_PATH/"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
